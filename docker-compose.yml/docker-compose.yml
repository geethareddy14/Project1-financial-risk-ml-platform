cat > docker-compose.yml << 'EOF'
version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

  mlflow:
    image: python:3.10-slim
    command: >
      bash -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./artifacts"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
EOF